<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Balan Medicals - Location</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100%; min-height: 280px; }
    .leaflet-control-attribution { font-size: 10px; }
    .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
    .leaflet-popup-content { margin: 12px 14px; font-size: 14px; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    (function() {
      var center = [8.815, 78.157];
      var map = L.map('map', { zoomControl: true }).setView(center, 16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
      }).addTo(map);
      var marker = L.marker(center).addTo(map);
      marker.bindPopup(
        '<b>New Balan Medicals</b><br>120/a Poobalarayapuram 2nd street, Thoothukudi, Tamil Nadu 628001',
        { maxWidth: 280 }
      );
      setTimeout(function() { map.invalidateSize(); }, 100);
    })();
  </script>
</body>
</html>
