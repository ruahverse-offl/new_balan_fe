# Frontend (build + nginx) — run from frontend directory: docker-compose up -d
# App: http://localhost:3000 (or your domain on Hostinger VPS)
# Copy .env.example to .env and set VITE_API_BASE_URL (see .env.example for Hostinger).

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # From .env or default. Hostinger: use https://yourdomain.com if site is HTTPS.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: newbalan-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
